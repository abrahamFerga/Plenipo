# =============================================================================
# ci.yml — Continuous Integration
# -----------------------------------------------------------------------------
# Runs on pull requests and pushes to non-main branches. Builds + tests BOTH the
# platform (Plenipo.slnx) and the samples (samples/Plenipo.Samples.slnx — the three
# demo verticals plus the integration tests that guard the RBAC/approval pipeline),
# builds (does NOT push) the Docker image, scans with Trivy, verifies both the NuGet
# packages and the @plenipo/ui npm package can be produced and consumed, and lints,
# tests, builds, and E2E-tests (real browser, Playwright) the React frontend.
#
# No cloud credentials required — this workflow never touches Azure.
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "24"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  # ---------------------------------------------------------------------------
  # .NET build + test + image build + Trivy scan
  # ---------------------------------------------------------------------------
  dotnet:
    name: .NET build, test & image scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore (platform + samples)
        run: |
          dotnet restore Plenipo.slnx
          dotnet restore samples/Plenipo.Samples.slnx

      - name: Build (platform + samples)
        run: |
          dotnet build Plenipo.slnx -c Release --no-restore
          dotnet build samples/Plenipo.Samples.slnx -c Release --no-restore

      - name: Test (platform + samples)
        # The samples integration tests spin up Postgres via Testcontainers; the
        # ubuntu-latest runner provides the Docker daemon they need.
        run: |
          dotnet test Plenipo.slnx -c Release --no-build --verbosity normal
          dotnet test samples/Plenipo.Samples.slnx -c Release --no-build --verbosity normal

      - name: Build Docker image (no push)
        run: |
          docker build \
            -f src/Plenipo.Api/Dockerfile \
            -t plenipo-api:${{ github.sha }} \
            .

      - name: Trivy image scan (fail on CRITICAL/HIGH)
        # Version tags gained a "v" prefix; the old bare 0.x tags no longer resolve.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: plenipo-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  # ---------------------------------------------------------------------------
  # Packaging: prove the platform packs to NuGet packages AND a fresh module
  # project can consume them — the "build on Plenipo as packages, don't fork"
  # promise. Guards against broken packing or bad package metadata.
  # ---------------------------------------------------------------------------
  package:
    name: Package consumption smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack the platform + build a consuming module
        run: bash eng/verify-packaging.sh

  # ---------------------------------------------------------------------------
  # Frontend (pnpm workspace): lint + unit/component tests + build + real-browser
  # E2E, across BOTH UI packages (@plenipo/ui and @plenipo/admin-ui).
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend lint, test, build & E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint (all packages)
        run: pnpm lint

      - name: Unit + component tests (all packages)
        run: pnpm -r test

      - name: Build (both UI packages)
        run: pnpm build:all

      - name: Install Playwright chromium
        run: pnpm --filter @plenipo/ui exec playwright install --with-deps chromium

      - name: E2E — domain shell (@plenipo/ui, real browser, API mocked)
        run: pnpm --filter @plenipo/ui test:e2e

      - name: E2E — admin console (@plenipo/admin-ui, real browser, API mocked)
        run: pnpm --filter @plenipo/admin-ui test:e2e

      - name: Verify @plenipo/ui is consumable (pack + type-check a fresh consumer)
        working-directory: ${{ github.workspace }}
        run: bash eng/verify-frontend-packaging.sh
