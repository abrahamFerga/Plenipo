# Dedicated-tenant provisioning (docs/COMMERCIALIZATION.md phase 6): one customer = one
# Terraform state = one isolated environment from the SAME infra/ modules. Dispatched by the
# billing worker via the workflow-dispatch REST API when a Dedicated-tier subscription lands
# (action=apply) or its cancellation grace expires (action=destroy) — and by operators by hand.
#
# Gated on the AZURE_DEPLOY_ENABLED repository variable exactly like deploy.yml: pushes and
# dispatches show a clean skip until the Azure subscription + OIDC secrets are configured.
name: Deploy customer

on:
  workflow_dispatch:
    inputs:
      customer:
        description: "Customer slug (lowercase kebab; becomes the state key and name prefix)"
        required: true
        type: string
      region:
        description: "Azure region"
        required: false
        default: "westeurope"
        type: string
      size:
        description: "Environment size"
        required: false
        default: "small"
        type: choice
        options: [small, medium, large]
      action:
        description: "apply provisions/updates; destroy tears down (grace window already elapsed)"
        required: false
        default: "apply"
        type: choice
        options: [apply, destroy]

run-name: "${{ inputs.action }} customer ${{ inputs.customer }} (${{ inputs.region }}/${{ inputs.size }})"

# One run at a time PER CUSTOMER; different customers run in parallel.
concurrency:
  group: customer-${{ inputs.customer }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC federation
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.customer }})
    if: vars.AZURE_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Validate customer slug
        working-directory: .
        run: |
          if ! echo "${{ inputs.customer }}" | grep -Eq '^[a-z][a-z0-9-]{1,20}$'; then
            echo "::error::customer must be lowercase kebab, 2-21 chars, starting with a letter (matches the Terraform validation)"; exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      # Per-customer state key in the SHARED backend storage — the isolation boundary.
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=tenants/${{ inputs.customer }}.tfstate"

      - name: Terraform ${{ inputs.action }}
        run: |
          terraform ${{ inputs.action }} -auto-approve \
            -var-file="environments/customer-${{ inputs.size }}.tfvars" \
            -var "environment=${{ inputs.customer }}" \
            -var "location=${{ inputs.region }}"

      - name: Smoke test
        if: inputs.action == 'apply'
        run: |
          API_URL="$(terraform output -raw api_url)"
          for i in $(seq 1 30); do
            if curl -fsS "${API_URL}/alive" > /dev/null; then echo "alive"; exit 0; fi
            sleep 10
          done
          echo "::error::environment did not become healthy"; exit 1
