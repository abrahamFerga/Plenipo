# =============================================================================
# publish.yml — Publish the Cortex platform artifacts.
# -----------------------------------------------------------------------------
# Runs when a GitHub Release is published (the tag drives the version), or on a
# manual dispatch with an explicit version. Two distribution channels:
#
#  1. GitHub Release ASSETS (release trigger only) — the nupkgs plus the two
#     prebuilt UI bundles (@cortex/ui app shell, @cortex/admin-ui). Assets are
#     ANONYMOUSLY downloadable, so a product repo can vendor its .packages/ and
#     wwwroot/ from a release URL with no checkout, no PAT, no registry. The UI
#     bundles are brand-agnostic: the shell resolves the product name at runtime
#     from /api/platform/branding (Branding:ProductName in the host's config).
#
#  2. GitHub Packages NuGet feed — for authenticated `dotnet add package` consumers.
#     (GitHub Packages requires a read:packages PAT even for public repos, which is
#     why the release assets above are the primary channel.)
#       dotnet nuget add source https://nuget.pkg.github.com/<OWNER>/index.json \
#         --name cortex --username <user> --password <a PAT with read:packages>
#
# The local pack+consume path is already proven on every CI run by
# eng/verify-packaging.sh (see ci.yml).
# =============================================================================

name: Publish packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet version to publish (e.g. 0.1.0-alpha.2)"
        type: string
        required: true

# GITHUB_TOKEN needs package-write for GitHub Packages and contents-write to
# attach assets to the release.
permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"

jobs:
  publish:
    name: Pack & push to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${GITHUB_REF_NAME#v}"   # strip the leading "v" from the release tag
          else
            version="${{ github.event.inputs.version }}"
          fi
          if [ -z "$version" ]; then echo "No version resolved." >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing Cortex packages @ $version"

      - name: Pack
        run: |
          dotnet pack Cortex.slnx -c Release -o ./artifacts \
            -p:PackageVersion="${{ steps.ver.outputs.version }}" \
            -p:RepositoryUrl="${{ github.server_url }}/${{ github.repository }}" \
            -p:PackageProjectUrl="${{ github.server_url }}/${{ github.repository }}"

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      # ------------------------------------------------------------------------
      # Prebuilt UI bundles — brand-agnostic (runtime branding) + same-origin API
      # (VITE_API_BASE=""), so any product host serves them from wwwroot/ as-is.
      # ------------------------------------------------------------------------
      - name: Setup pnpm
        if: github.event_name == 'release'
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node
        if: github.event_name == 'release'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build UI bundles
        if: github.event_name == 'release'
        env:
          VITE_API_BASE: ""
        run: |
          pnpm -C frontend install --frozen-lockfile
          pnpm -C frontend/cortex-ui build:app
          pnpm -C frontend/admin-ui build
          (cd frontend/cortex-ui/dist-app && zip -r "$GITHUB_WORKSPACE/artifacts/cortex-ui-app.zip" .)
          (cd frontend/admin-ui/dist && zip -r "$GITHUB_WORKSPACE/artifacts/cortex-admin-ui.zip" .)

      # The @cortex/ui LIBRARY as an npm tarball — for product hosts that build their own app
      # entry on the moduleUi seam (e.g. Networthy's ADR-0008) and vendor the library the same
      # way they vendor the nupkgs, instead of file:-linking a sibling checkout. Built with
      # VITE_API_BASE="" (frozen into the dist at library-build time) so consumers get
      # same-origin API calls; a checked-out source alias covers dev servers that need a live env.
      - name: Pack the @cortex/ui library tarball
        if: github.event_name == 'release'
        env:
          VITE_API_BASE: ""
        run: |
          pnpm -C frontend/cortex-ui build
          (cd frontend/cortex-ui && npm pkg set version="${{ steps.ver.outputs.version }}")
          pnpm -C frontend/cortex-ui pack --pack-destination "$GITHUB_WORKSPACE/artifacts"
          ls -l "$GITHUB_WORKSPACE"/artifacts/cortex-ui-*.tgz

      - name: Attach artifacts to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" ./artifacts/*.nupkg ./artifacts/*.zip ./artifacts/*.tgz --clobber
