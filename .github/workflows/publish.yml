# =============================================================================
# publish.yml — Publish the Plenipo platform artifacts.
# -----------------------------------------------------------------------------
# Runs when a GitHub Release is published (the tag drives the version), or on a
# manual dispatch with an explicit version. Three distribution channels:
#
#  1. public npm registry — the @plenipo/ui LIBRARY, so product hosts install it
#     with `pnpm add @plenipo/ui` (no release-asset copying). Published with
#     provenance. Requires the NPM_TOKEN secret (an automation token for the @abrahamferga scope).
#
#  2. GitHub Release ASSETS (release trigger only) — the nupkgs plus the two prebuilt UI
#     bundles (the plenipo-ui APP SHELL zip and the @plenipo/admin-ui console zip). Assets are
#     ANONYMOUSLY downloadable, so a product repo can vendor its .packages/ and wwwroot/ from a
#     release URL with no checkout, no PAT, no registry. The bundles are brand-agnostic: the
#     shell resolves the product name at runtime from /api/platform/branding.
#
#  3. GitHub Packages NuGet feed — for authenticated `dotnet add package` consumers.
#     (GitHub Packages requires a read:packages PAT even for public repos, which is
#     why the release assets above are the primary channel.)
#       dotnet nuget add source https://nuget.pkg.github.com/<OWNER>/index.json \
#         --name plenipo --username <user> --password <a PAT with read:packages>
#
# The local pack+consume path is already proven on every CI run by
# eng/verify-packaging.sh (see ci.yml).
# =============================================================================

name: Publish packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet version to publish (e.g. 0.1.0-alpha.2)"
        type: string
        required: true

# GITHUB_TOKEN needs package-write for GitHub Packages and contents-write to
# attach assets to the release. id-token: write lets `npm publish --provenance`
# mint a signed provenance attestation for the @plenipo/ui npm package.
permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"

jobs:
  publish:
    name: Pack & push to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${GITHUB_REF_NAME#v}"   # strip the leading "v" from the release tag
          else
            version="${{ github.event.inputs.version }}"
          fi
          if [ -z "$version" ]; then echo "No version resolved." >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing Plenipo packages @ $version"

      - name: Pack
        run: |
          dotnet pack Plenipo.slnx -c Release -o ./artifacts \
            -p:PackageVersion="${{ steps.ver.outputs.version }}" \
            -p:RepositoryUrl="${{ github.server_url }}/${{ github.repository }}" \
            -p:PackageProjectUrl="${{ github.server_url }}/${{ github.repository }}"

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      # ------------------------------------------------------------------------
      # Prebuilt UI bundles — brand-agnostic (runtime branding) + same-origin API
      # (VITE_API_BASE=""), so any product host serves them from wwwroot/ as-is.
      # ------------------------------------------------------------------------
      - name: Setup pnpm
        if: github.event_name == 'release'
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Setup Node
        if: github.event_name == 'release'
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
          # Writes an .npmrc that authenticates to the public npm registry via NODE_AUTH_TOKEN,
          # so the publish step below can `npm publish` @plenipo/ui.
          registry-url: "https://registry.npmjs.org"

      - name: Build UI bundles
        if: github.event_name == 'release'
        env:
          VITE_API_BASE: ""
        run: |
          pnpm -C frontend install --frozen-lockfile
          pnpm -C frontend/plenipo-ui build:app
          pnpm -C frontend/admin-ui build
          (cd frontend/plenipo-ui/dist-app && zip -r "$GITHUB_WORKSPACE/artifacts/plenipo-ui-app.zip" .)
          (cd frontend/admin-ui/dist && zip -r "$GITHUB_WORKSPACE/artifacts/plenipo-admin-ui.zip" .)

      # Publish the @plenipo/ui LIBRARY to the public npm registry — product hosts that
      # build their own app entry on the moduleUi seam (e.g. Networthy's ADR-0008) now install it
      # with `pnpm add @plenipo/ui`, no release-asset copying. The dist is built with
      # VITE_API_BASE="" (frozen at library-build time) so consumers get same-origin API calls; a
      # checked-out source alias still covers dev servers that need a live env. --provenance signs a
      # build attestation (needs id-token: write); --ignore-scripts avoids re-running prepack since
      # we just built. Requires an NPM_TOKEN secret (automation token for the @abrahamferga scope).
      - name: Publish @plenipo/ui to npm
        if: github.event_name == 'release'
        env:
          VITE_API_BASE: ""
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm -C frontend/plenipo-ui build
          (cd frontend/plenipo-ui && npm pkg set version="${{ steps.ver.outputs.version }}")
          (cd frontend/plenipo-ui && npm publish --ignore-scripts --access public --provenance --tag latest)

      - name: Attach artifacts to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" ./artifacts/*.nupkg ./artifacts/*.zip --clobber
