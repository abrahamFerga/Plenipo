packages:
  # Base platform library (the end-user / domain shell) — publishable as @cortex/ui
  - "cortex-ui"

  # Admin console app (security / RBAC / users / token usage / audit) — served at /admin
  - "admin-ui"

  # Domain-specific UI packages (future — each vertical ships its own)
  # - "packages/finance-ui"   # @cortex/finance-ui
  # - "packages/nutrition-ui" # @cortex/nutrition-ui

  # Sample / demo applications
  # - "apps/demo"

# Allow native postinstall build scripts only for the deps that genuinely need them
# (esbuild fetches its platform binary; Vite uses it). pnpm blocks all others by default.
allowBuilds:
  esbuild: true

# Vitest supports multiple Vite majors and otherwise resolves the lowest compatible release.
# Keep every dev-server path on the patched Vite line.
overrides:
  vite: 6.4.3
