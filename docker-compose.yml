# Local development dependencies for Plenipo. See GETTING_STARTED.md.
#
#   docker compose up -d
#
# Postgres hosts the platform / audit / finance schemas (one database for simple local
# dev; production uses separate databases — see infra/). Redis is the SignalR backplane.
services:
  postgres:
    image: pgvector/pgvector:pg16  # vector extension needed by the opt-in RAG pipeline
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plenipo_platform
    ports:
      - "5432:5432"
    volumes:
      - plenipo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  plenipo-pgdata:
